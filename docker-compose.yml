version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: gateway_db
    environment:
      POSTGRES_USER: juggler
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gateway_auth
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U juggler -d gateway_auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gateway_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.1.11
    container_name: gateway_kafka
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: gateway_clickhouse
    environment:
      - CLICKHOUSE_USER=juggler
      - CLICKHOUSE_PASSWORD=password
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./docker/clickhouse-init:/docker-entrypoint-initdb.d
      - gateway_clickhouse_data:/var/lib/clickhouse
    depends_on:
      redpanda:
        condition: service_healthy

volumes:
  pgdata:
  gateway_clickhouse_data:
