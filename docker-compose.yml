version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# Juggler LLM Gateway — Full Stack
# Run: docker-compose up -d
# Dashboard: http://localhost:8081
# Gateway:   http://localhost:8080/v1/chat/completions
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: gateway_db
    environment:
      POSTGRES_USER: juggler
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gateway_auth
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U juggler -d gateway_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: gateway_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.1.11
    container_name: gateway_kafka
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: gateway_clickhouse
    environment:
      - CLICKHOUSE_USER=juggler
      - CLICKHOUSE_PASSWORD=password
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./docker/clickhouse-init:/docker-entrypoint-initdb.d
      - gateway_clickhouse_data:/var/lib/clickhouse
    depends_on:
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user juggler --password password --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Application Services ────────────────────────────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: crates/gateway-core/Dockerfile
    container_name: gateway_proxy
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - KAFKA_BROKERS=redpanda:9092
      - DATABASE_URL=postgres://juggler:password@postgres:5432/gateway_auth
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  admin:
    build:
      context: .
      dockerfile: services/admin-api/Dockerfile
    container_name: gateway_admin
    ports:
      - "8081:8081"
    environment:
      - CLICKHOUSE_ADDR=gateway_clickhouse:9000
      - CLICKHOUSE_USER=juggler
      - CLICKHOUSE_PASSWORD=password
      - DATABASE_URL=postgres://juggler:password@postgres:5432/gateway_auth
      - ADMIN_API_KEY=${ADMIN_API_KEY:-changeme}
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  gateway_clickhouse_data:
